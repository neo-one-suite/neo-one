name: Cypress
on:
  push:
    branches:
      - master
      - staging
      - trying
  pull_request:
    branches:
      - master
      - staging
      - trying
jobs:
  cypress12:
    name: cypress12
    runs-on: macOS-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@25a956c84d5dd820d28caab9f86b8d183aeeff3d
      - name: Install Node
        run: brew update-reset && brew update && brew unlink node@12 && brew install node@10 && brew link node@10 --force
      - name: Install Chrome
        run: brew cask install google-chrome
      - name: Install Rush
        run: npm i -g @microsoft/rush@latest
      - name: Rush Install
        run: rush install
      - name: Rush Rebuild
        run: rush rebuild
      - name: Prune node_modules
        run: rush prune-node-modules
      - name: Rush Link Root
        run: rush link-root
      - name: Run Cypress Express Test
        run: rush test-cypress --express
      - name: Store Cypress Screenshots
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@11e311c8b504ea40cbed20583a64d75b4735cff3
        with:
          name: cypress-screenshots
          path: cypress/screenshots
